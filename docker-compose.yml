services:
  app:
    build: .
    image: anthroclaw:local
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      TZ: ${TZ:-UTC}
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    volumes:
      - ./data:/app/data
      - ./agents:/app/agents
      - ./config.yml:/app/config.yml:ro
      # Optional: bind-mount the host's Claude credentials so the SDK reads
      # the refresh-token-rotated access token (no expiry headaches). The
      # node user inside the image is uid 1000 — matches the default ubuntu
      # user on most VPSes. If you enable this, comment out
      # CLAUDE_CODE_OAUTH_TOKEN in .env (env vars take precedence).
      # - /home/ubuntu/.claude:/home/node/.claude
    ports:
      # Bind to loopback only — put nginx/caddy in front for TLS + auth.
      - "127.0.0.1:${UI_PORT:-3000}:3000"
    init: true
    # Sandbox support for the Claude Agent SDK (bubblewrap):
    # - user 0 + CAP_SYS_ADMIN: bwrap needs to create user namespaces and set up
    #   uid maps. Docker default (UID 1000, no SYS_ADMIN) blocks both — sandbox
    #   tool execution then fails silently and the model returns no text.
    # - seccomp/apparmor unconfined: Docker default seccomp blocks unshare()
    #   with CLONE_NEWUSER even for root.
    # Container isolation itself remains the security boundary; bwrap is an
    # additional layer for tool calls within the SDK.
    user: "0:0"
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp=unconfined
      - apparmor=unconfined
    working_dir: /app/ui
    # Next.js hosts the UI AND embeds the Gateway runtime (Telegram polling,
    # MCP tools, sessions, cron). One process, one Telegram polling owner,
    # one source of truth for /api/gateway/status.
    command: ["node", "node_modules/next/dist/bin/next", "start"]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/login').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
