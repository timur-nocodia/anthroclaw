model: claude-sonnet-4-6
timezone: Asia/Almaty

safety_profile: chat_like_openclaw

routes:
  - channel: telegram
    scope: dm

pairing:
  mode: off

allowlist:
  telegram: [ "48705953" ]

mcp_tools:
  - memory_search
  - memory_write
  - send_message
  - list_skills
  - manage_skills
  - manage_cron
  - escalate

queue_mode: steer

iteration_budget:
  max_tool_calls: 30
  timeout_ms: 120000
  grace_message: true

auto_compress:
  enabled: true
  threshold_messages: 15

# ─── Learning loop rollout test ───
# Propose-only: stores learning actions for operator review via `pnpm learning`.
# Does not auto-apply memory or skill changes.
learning:
  enabled: true
  mode: propose
  review_interval_turns: 10
  skill_review_min_tool_calls: 8

quick_commands:
  status:
    command: "echo '✅ Bot is running'; echo \"PID: $$\"; echo \"Node: $(node -v)\";
      echo \"PWD: $(pwd)\"; echo \"Started: $(ps -p $PPID -o lstart= 2>/dev/null
      || echo unknown)\""
    timeout: 10
  disk:
    command: "df -h / | tail -1"
    timeout: 10
  memory:
    command: "out=$(find agents/example/memory -name '*.md' -type f 2>/dev/null |
      head -20); [ -n \"$out\" ] && echo \"$out\" || echo 'No memory files yet'"
    timeout: 10

cron:
  - id: silent-test
    schedule: "*/2 * * * *"
    prompt: "Check if everything is OK. If all is fine, respond with exactly
      [SILENT]. If something is wrong, describe the problem."
    deliver_to:
      channel: telegram
      peer_id: "48705953"
    enabled: false
